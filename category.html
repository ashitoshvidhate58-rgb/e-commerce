<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Categories - ZeptoStore</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Pagination Styles - Numbered Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            margin: 2rem 0 3rem 0;
            flex-wrap: wrap;
        }

        .pagination-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .page-btn, .page-number {
            min-width: 40px;
            height: 40px;
            padding: 0 0.8rem;
            background: white;
            color: #667eea;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .page-number {
            background: white;
            color: #333;
        }

        .page-number.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        .page-btn:hover:not(:disabled), .page-number:hover:not(.active) {
            background: #f0f0f0;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-dots {
            padding: 0 0.5rem;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .pagination-controls {
                gap: 0.3rem;
            }
            
            .page-btn, .page-number {
                min-width: 32px;
                height: 32px;
                padding: 0 0.5rem;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .page-btn, .page-number {
                min-width: 28px;
                height: 28px;
                padding: 0 0.4rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🛍️ E-commerce</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="category.html" class="nav-link active">📁 Categories</a>
            <a href="addProduct.html" class="nav-link">➕ Add Product</a>
            <a href="updateProduct.html" class="nav-link">✏️ Update Product</a>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 Cart <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="category-tabs" id="categoryTabs"></div>
        
        <div id="productsContainer" class="products-grid"></div>
        
        <!-- Numbered Pagination Bottom -->
        <div id="pagination" class="pagination"></div>
    </div>

    <!-- Cart Drawer -->
    <div id="cartOverlay" class="cart-overlay">
        <div class="cart-drawer">
            <div class="cart-header">
                <h3>🛒 Your Cart</h3>
                <button onclick="toggleCart()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">✕</button>
            </div>
            <div id="cartItemsList" class="cart-items"></div>
            <div class="cart-footer">
                <div style="font-size: 1.2rem; font-weight: bold;">Total: ₹<span id="cartTotal">0</span></div>
                <button class="checkout-btn" onclick="proceedToCheckout()">💳 Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // ==================== PAGINATION VARIABLES ====================
        let currentPage = 1;
        let totalPages = 1;
        let totalProducts = 0;
        let perPage = 12;
        let currentCategory = "all";

        // ==================== CATEGORIES DATA ====================
        const categories = [
            { id: "all", name: "All Products", icon: "🎯" },
            { id: "Electronics", name: "Electronics", icon: "📱" },
            { id: "Clothing", name: "Clothing", icon: "👕" },
            { id: "Books", name: "Books", icon: "📚" },
            { id: "Sports", name: "Sports", icon: "⚽" },
            { id: "Home", name: "Home", icon: "🏠" },
            { id: "Beauty", name: "Beauty", icon: "💄" },
            { id: "Toys", name: "Toys", icon: "🧸" }
        ];

        // ==================== URL HELPERS ====================
        function updateURL() {
            let hash = `page=${currentPage}`;
            if (currentCategory !== 'all') {
                hash += `&category=${currentCategory}`;
            }
            window.location.hash = hash;
        }

        function getPageFromURL() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            
            const page = parseInt(params.get('page'));
            const category = params.get('category');
            
            if (!isNaN(page) && page > 0) {
                currentPage = page;
            }
            
            if (category && category !== 'all') {
                currentCategory = category;
            }
        }

        // ==================== CATEGORY FUNCTIONS ====================
        function renderCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            if (!container) return;
            
            container.innerHTML = categories.map(cat => `
                <button class="category-tab ${currentCategory === cat.id ? 'active' : ''}" onclick="selectCategory('${cat.id}')">
                    ${cat.icon} ${cat.name}
                </button>
            `).join('');
        }

        async function selectCategory(category) {
            currentCategory = category;
            currentPage = 1;
            renderCategoryTabs();
            updateURL();
            await loadCategoryProducts();
        }

        // ==================== PRODUCTS LOADING ====================
        async function loadCategoryProducts() {
            try {
                const container = document.getElementById('productsContainer');
                if (container) {
                    container.innerHTML = '<div class="loading">Loading products... ⏳</div>';
                }
                
                let url = `${API}/products?page=${currentPage}&limit=${perPage}`;
                if (currentCategory !== 'all') {
                    url += `&category=${currentCategory}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                totalProducts = data.total || 0;
                totalPages = Math.ceil(totalProducts / perPage);
                
                renderProducts(data.data || []);
                renderPagination();
                
            } catch (error) {
                console.error('Error loading products:', error);
                const container = document.getElementById('productsContainer');
                if (container) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                            <h3>⚠️ Backend Error</h3>
                            <p>Make sure JSON Server is running at ${API}</p>
                            <p>Run: npx json-server --watch db.json --port 3001</p>
                        </div>
                    `;
                }
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            if (!container) return;
            
            if (!products.length) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">No products in this category 🔍</div>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-icon">${getCategoryIcon(product.category)}</div>
                    <div class="product-info">
                        <div class="product-category">${escapeHtml(product.category || 'Uncategorized')}</div>
                        <div class="product-title">${escapeHtml(product.title)}</div>
                        <div class="product-price">₹${(product.price || 0).toLocaleString('en-IN')}</div>
                        <div class="product-rating">${renderStars(product.rating)}</div>
                        <div style="font-size: 0.8rem; color: #666;">${escapeHtml(product.brand || 'No brand')}</div>
                    </div>
                    <div class="product-actions">
                        <button class="add-to-cart" onclick='addToCart(${JSON.stringify(product).replace(/'/g, "&#39;")})'>🛒 Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== NUMBERED PAGINATION WITH < and > ====================
        function renderPagination() {
            const container = document.getElementById('pagination');
            if (!container) return;
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let paginationHTML = '<div class="pagination-controls">';
            
            // Previous Button (<)
            paginationHTML += `
                <button class="page-btn" onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>
                    &lt;
                </button>
            `;
            
            // Page Numbers (1 2 3 4 5 ... 10)
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage + 1 < maxVisible) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }
            
            // First page + dots
            if (startPage > 1) {
                paginationHTML += `<button class="page-number" onclick="goToPage(1)">1</button>`;
                if (startPage > 2) {
                    paginationHTML += `<span class="page-dots">...</span>`;
                }
            }
            
            // Page numbers
            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `
                    <button class="page-number ${currentPage === i ? 'active' : ''}" 
                            onclick="goToPage(${i})">
                        ${i}
                    </button>
                `;
            }
            
            // Last page + dots
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    paginationHTML += `<span class="page-dots">...</span>`;
                }
                paginationHTML += `<button class="page-number" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            
            // Next Button (>)
            paginationHTML += `
                <button class="page-btn" onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>
                    &gt;
                </button>
            `;
            
            paginationHTML += `</div>`;
            paginationHTML += `<div class="page-info-text">Page ${currentPage} of ${totalPages} | ${totalProducts} products</div>`;
            
            container.innerHTML = paginationHTML;
        }
        
        function goToPage(page) {
            if (page !== currentPage && page >= 1 && page <= totalPages) {
                currentPage = page;
                updateURL();
                loadCategoryProducts();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                updateURL();
                loadCategoryProducts();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                updateURL();
                loadCategoryProducts();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // ==================== WATCH URL CHANGES ====================
        window.addEventListener('hashchange', function() {
            getPageFromURL();
            renderCategoryTabs();
            loadCategoryProducts();
        });

        // ==================== INITIALIZE PAGE ====================
        getPageFromURL();
        renderCategoryTabs();
        loadCategoryProducts();
    </script>
</body>
</html>
