<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - ZeptoStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🛍️ ZeptoStore</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="category.html" class="nav-link active">📁 Categories</a>
            <a href="addProduct.html" class="nav-link">➕ Add Product</a>
            <a href="updateProduct.html" class="nav-link">✏️ Update Product</a>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 Cart <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="category-tabs" id="categoryTabs"></div>
        <div id="categoryStats" class="category-stats" style="display: none;"></div>
        <div id="productsContainer" class="products-grid"></div>
    </div>

    <!-- Cart Drawer -->
    <div id="cartOverlay" class="cart-overlay">
        <div class="cart-drawer">
            <div class="cart-header">
                <h3>🛒 Your Cart</h3>
                <button onclick="toggleCart()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">✕</button>
            </div>
            <div id="cartItemsList" class="cart-items"></div>
            <div class="cart-footer">
                <div style="font-size: 1.2rem; font-weight: bold;">Total: ₹<span id="cartTotal">0</span></div>
                <button class="checkout-btn" onclick="proceedToCheckout()">💳 Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentCategory = "all";

        const categories = [
            { id: "all", name: "All Products", icon: "🎯" },
            { id: "Electronics", name: "Electronics", icon: "📱" },
            { id: "Clothing", name: "Clothing", icon: "👕" },
            { id: "Books", name: "Books", icon: "📚" },
            { id: "Sports", name: "Sports", icon: "⚽" },
            { id: "Home", name: "Home", icon: "🏠" },
            { id: "Beauty", name: "Beauty", icon: "💄" },
            { id: "Toys", name: "Toys", icon: "🧸" }
        ];

        function renderCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = categories.map(cat => `
                <button class="category-tab ${currentCategory === cat.id ? 'active' : ''}" onclick="selectCategory('${cat.id}')">
                    ${cat.icon} ${cat.name}
                </button>
            `).join('');
        }

        async function selectCategory(category) {
            currentCategory = category;
            renderCategoryTabs();
            await loadCategoryProducts();
            if (category !== 'all') {
                await loadCategoryStats(category);
            } else {
                document.getElementById('categoryStats').style.display = 'none';
            }
        }

        async function loadCategoryProducts() {
            try {
                let url = `${API}/products?limit=100`;
                if (currentCategory !== 'all') {
                    url += `&category=${currentCategory}`;
                }
                const response = await fetch(url);
                const data = await response.json();
                renderProducts(data.data || []);
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            if (!products.length) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">No products in this category 🔍</div>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-icon">${getCategoryIcon(product.category)}</div>
                    <div class="product-info">
                        <div class="product-category">${escapeHtml(product.category || 'Uncategorized')}</div>
                        <div class="product-title">${escapeHtml(product.title)}</div>
                        <div class="product-price">₹${(product.price || 0).toLocaleString('en-IN')}</div>
                        <div class="product-rating">${renderStars(product.rating)}</div>
                        <div style="font-size: 0.8rem; color: #666;">${escapeHtml(product.brand || 'No brand')}</div>
                    </div>
                    <div class="product-actions">
                        <button class="add-to-cart" onclick='addToCart(${JSON.stringify(product).replace(/'/g, "&#39;")})'>🛒 Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadCategoryStats(category) {
            try {
                const response = await fetch(`${API}/categories/${category.toLowerCase()}/stats`);
                const stats = await response.json();
                const statsContainer = document.getElementById('categoryStats');
                statsContainer.style.display = 'grid';
                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Total Products</div>
                        <div class="stat-value">${stats.totalProducts || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Avg Price</div>
                        <div class="stat-value">₹${(stats.avgPrice || 0).toLocaleString('en-IN')}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Min Price</div>
                        <div class="stat-value">₹${(stats.minPrice || 0).toLocaleString('en-IN')}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Max Price</div>
                        <div class="stat-value">₹${(stats.maxPrice || 0).toLocaleString('en-IN')}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Avg Rating</div>
                        <div class="stat-value">⭐ ${(stats.avgRating || 0).toFixed(1)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Stock</div>
                        <div class="stat-value">${stats.totalStock || 0}</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        renderCategoryTabs();
        loadCategoryProducts();
    </script>
</body>
</html>
