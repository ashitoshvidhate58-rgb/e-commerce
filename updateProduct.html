<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Product - ZeptoStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🛍️ ZeptoStore</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="category.html" class="nav-link">📁 Categories</a>
            <a href="addProduct.html" class="nav-link">➕ Add Product</a>
            <a href="updateProduct.html" class="nav-link active">✏️ Update Product</a>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 Cart <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="search-section" style="margin: 0 0 2rem 0; padding: 0;">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search product to update...">
        </div>
        <div id="productsContainer" class="products-grid"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Edit Product</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Product Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" id="editPrice" required>
                    </div>
                    <div class="form-group">
                        <label>Rating</label>
                        <input type="number" id="editRating" step="0.1" min="0" max="5">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="editCategory">
                            <option value="Electronics">📱 Electronics</option>
                            <option value="Clothing">👕 Clothing</option>
                            <option value="Books">📚 Books</option>
                            <option value="Sports">⚽ Sports</option>
                            <option value="Home">🏠 Home</option>
                            <option value="Beauty">💄 Beauty</option>
                            <option value="Toys">🧸 Toys</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" id="editBrand" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="editStock">
                </div>
                <button type="button" class="submit-btn" onclick="updateProduct()">💾 Update Product</button>
            </form>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div id="cartOverlay" class="cart-overlay">
        <div class="cart-drawer">
            <div class="cart-header">
                <h3>🛒 Your Cart</h3>
                <button onclick="toggleCart()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">✕</button>
            </div>
            <div id="cartItemsList" class="cart-items"></div>
            <div class="cart-footer">
                <div style="font-size: 1.2rem; font-weight: bold;">Total: ₹<span id="cartTotal">0</span></div>
                <button class="checkout-btn" onclick="proceedToCheckout()">💳 Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let totalProducts = 0;
        let searchTerm = '';
        let perPage = 12;

        async function loadProducts() {
            try {
                let url = `${API}/products?page=${currentPage}&limit=${perPage}`;
                if (searchTerm) {
                    url += `&search=${encodeURIComponent(searchTerm)}`;
                }
                const response = await fetch(url);
                const data = await response.json();
                totalProducts = data.total || 0;
                totalPages = Math.ceil(totalProducts / perPage);
                renderProducts(data.data || []);
                renderPagination();
            } catch (error) {
                document.getElementById('productsContainer').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <h3>⚠️ Backend Error</h3>
                        <p>Make sure JSON Server is running at ${API}</p>
                    </div>
                `;
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            if (!products.length) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">No products found</div>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-icon">${getCategoryIcon(product.category)}</div>
                    <div class="product-info">
                        <div class="product-category">${escapeHtml(product.category || 'Uncategorized')}</div>
                        <div class="product-title">${escapeHtml(product.title)}</div>
                        <div class="product-price">₹${(product.price || 0).toLocaleString('en-IN')}</div>
                        <div class="product-rating">${renderStars(product.rating)}</div>
                        <div style="font-size: 0.8rem; color: #666;">${escapeHtml(product.brand || 'No brand')}</div>
                    </div>
                    <div class="product-actions">
                        <button class="add-to-cart" onclick='openEditModal(${JSON.stringify(product).replace(/'/g, "&#39;")})'>✏️ Edit Product</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <button onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>← Previous</button>
                <span class="page-info">Page ${currentPage} of ${totalPages}</span>
                <button onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
            `;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadProducts();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                loadProducts();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // SOLUTION 3: Updated openEditModal with better error handling
        function openEditModal(product) {
            if (!product || !product.id) {
                showToast('Invalid product data', 'error');
                return;
            }
            
            document.getElementById('editId').value = product.id;
            document.getElementById('editTitle').value = product.title || '';
            document.getElementById('editPrice').value = product.price || 0;
            document.getElementById('editRating').value = product.rating || '';
            document.getElementById('editCategory').value = product.category || 'Electronics';
            document.getElementById('editBrand').value = product.brand || '';
            document.getElementById('editDescription').value = product.description || '';
            document.getElementById('editStock').value = product.stock || 0;
            document.getElementById('editModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('open');
        }

        // SOLUTION 1 & 2: Updated updateProduct with better error handling and product existence check
        async function updateProduct() {
            const id = document.getElementById('editId').value;
            const updatedProduct = {
                title: document.getElementById('editTitle').value,
                price: parseFloat(document.getElementById('editPrice').value),
                rating: parseFloat(document.getElementById('editRating').value) || 0,
                category: document.getElementById('editCategory').value,
                brand: document.getElementById('editBrand').value,
                description: document.getElementById('editDescription').value,
                stock: parseInt(document.getElementById('editStock').value) || 0,
                updatedAt: new Date().toISOString()
            };

            if (!updatedProduct.title || !updatedProduct.price || !updatedProduct.brand) {
                showToast('Please fill all required fields!', 'error');
                return;
            }

            try {
                console.log(`Updating product ${id} with:`, updatedProduct);
                console.log(`API endpoint: ${API}/products/${id}`);

                // If product exists, update it using PATCH (not PUT)
                const response = await fetch(`${API}/products/${id}`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(updatedProduct)
                });

                console.log(`Response status: ${response.status}`);

                if (response.ok) {
                    showToast('Product updated successfully! ✅');
                    closeModal();
                    loadProducts(); // Refresh the list
                } else if (response.status === 404) {
                    showToast('Product not found! It may have been deleted.', 'error');
                    closeModal();
                    loadProducts();
                } else {
                    const error = await response.json().catch(() => ({ message: 'Unknown error' }));
                    showToast(error.message || `Failed to update product (${response.status})`, 'error');
                    console.error('Update failed:', error);
                }
            } catch (error) {
                console.error('Update error:', error);
                showToast('Error: ' + error.message + '. Make sure backend is running at ' + API, 'error');
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            currentPage = 1;
            loadProducts();
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        loadProducts();
    </script>
</body>
</html>
