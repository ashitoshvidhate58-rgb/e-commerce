<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZenithCart | Modern E-Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-dark: #0B1120;
            --surface: #1E293B;
            --card-bg: #0F172A;
            --accent: #3B82F6;
            --accent-glow: #2563EB;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --border-glow: rgba(59,130,246,0.3);
            --danger: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Glass Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(59,130,246,0.2);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60A5FA, #A855F7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--accent);
            font-size: 1.7rem;
        }

        .search-wrapper {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--surface);
            border: 1px solid #334155;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }

        .nav-actions {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.3);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .nav-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .cart-btn {
            position: relative;
            background: var(--accent);
            border-color: var(--accent);
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-dark);
        }

        /* Main layout */
        .app-container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            gap: 2rem;
        }

        /* Sidebar filters */
        .filters-sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid #1E293B;
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .filter-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 1rem 0 0.6rem 0;
        }

        .filter-title:first-of-type { margin-top: 0; }

        .filter-input, .filter-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid #2D3A4E;
            border-radius: 14px;
            color: white;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .price-row {
            display: flex;
            gap: 8px;
        }

        .apply-btn, .reset-btn {
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }

        .apply-btn {
            background: var(--accent);
            color: white;
        }

        .reset-btn {
            background: #334155;
            color: var(--text-primary);
        }

        /* Products Grid */
        .products-area {
            flex: 1;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .result-text {
            font-size: 0.85rem;
            background: rgba(59,130,246,0.1);
            padding: 6px 14px;
            border-radius: 40px;
        }

        .view-options i {
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            background: var(--surface);
            margin-left: 6px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        /* Product Card - Unique glassmorphism */
        .product-card {
            background: linear-gradient(145deg, #111827, #0F172A);
            border-radius: 28px;
            border: 1px solid rgba(59,130,246,0.15);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(4px);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.2);
        }

        /* No images — Icon placeholder */
        .card-icon {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0B1120;
            border-bottom: 1px solid #1E293B;
            font-size: 4rem;
            color: var(--accent);
        }

        .product-info {
            padding: 1.2rem;
        }

        .category-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: inline-block;
            background: rgba(59,130,246,0.15);
            padding: 3px 10px;
            border-radius: 40px;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 8px 0 4px;
            line-height: 1.3;
        }

        .brand {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .price-rating {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 12px 0;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--success);
        }

        .rating {
            background: rgba(245,158,11,0.15);
            padding: 4px 8px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .cart-action {
            flex: 2;
            background: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-action {
            flex: 1;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 40px;
            color: var(--danger);
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-action:hover {
            background: var(--danger);
            color: white;
        }

        .cart-action:hover {
            background: var(--accent-glow);
            transform: scale(0.98);
        }

        /* Pagination */
        .pagination-wrap {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 2rem;
        }

        .page-btn {
            background: var(--surface);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .page-btn.active {
            background: var(--accent);
        }

        /* Cart Drawer (Right Side) */
        .cart-drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            justify-content: flex-end;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .cart-drawer-overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .cart-panel {
            width: 420px;
            background: #0B1120;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--accent);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .cart-drawer-overlay.open .cart-panel {
            transform: translateX(0);
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid #1E293B;
            display: flex;
            justify-content: space-between;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cart-item-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cart-item-icon {
            width: 45px;
            height: 45px;
            background: #0F172A;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .cart-item-price {
            color: var(--success);
            font-size: 0.8rem;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1E293B;
            padding: 4px 8px;
            border-radius: 40px;
        }

        .qty-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 24px;
        }

        .cart-footer {
            padding: 1rem;
            border-top: 1px solid #1E293B;
        }

        .checkout-button {
            width: 100%;
            background: linear-gradient(95deg, var(--accent), #A855F7);
            padding: 14px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        .empty-cart-message {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        /* Toast */
        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1E293B;
            backdrop-filter: blur(12px);
            border-left: 4px solid var(--success);
            padding: 12px 20px;
            border-radius: 14px;
            z-index: 1100;
            font-weight: 500;
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(40px);}
            to { opacity: 1; transform: translateX(0);}
        }

        @media (max-width: 800px) {
            .app-container { flex-direction: column; padding: 1rem; }
            .filters-sidebar { position: static; width: 100%; }
            .cart-panel { width: 100%; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <i class="fas fa-bolt"></i> Zenith<span style="color:#60A5FA">Cart</span>
    </div>
    <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="globalSearch" class="search-input" placeholder="Search products, brand, category...">
    </div>
    <div class="nav-actions">
        <!-- ADD PRODUCT BUTTON REMOVED as requested -->
        <button class="nav-btn" id="statsBtn"><i class="fas fa-chart-line"></i> Stats</button>
        <button class="nav-btn cart-btn" id="cartDrawerBtn">
            <i class="fas fa-shopping-bag"></i> Cart
            <span class="cart-badge" id="cartCountBadge">0</span>
        </button>
    </div>
</nav>

<div class="app-container">
    <!-- FILTER SIDEBAR -->
    <aside class="filters-sidebar">
        <div class="filter-title"><i class="fas fa-tag"></i> Price Range</div>
        <div class="price-row">
            <input type="number" id="minPrice" class="filter-input" placeholder="Min ₹">
            <input type="number" id="maxPrice" class="filter-input" placeholder="Max ₹">
        </div>
        <div class="filter-title"><i class="fas fa-star"></i> Min Rating</div>
        <input type="number" id="minRating" class="filter-input" step="0.1" placeholder="Rating ≥ 3.5">
        <div class="filter-title"><i class="fas fa-sort-amount-down"></i> Sort By</div>
        <select id="sortSelect" class="filter-select">
            <option value="createdAt">Newest First</option>
            <option value="price">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rating</option>
        </select>
        <div class="filter-title"><i class="fas fa-layer-group"></i> Per Page</div>
        <select id="perPageSelect" class="filter-select">
            <option value="12">12 items</option>
            <option value="24">24 items</option>
        </select>
        <button class="apply-btn" id="applyFilterBtn"><i class="fas fa-filter"></i> Apply Filters</button>
        <button class="reset-btn" id="resetFilterBtn">Clear All</button>
    </aside>

    <main class="products-area">
        <div class="top-bar">
            <div class="result-text" id="resultInfo">✨ Loading products...</div>
            <div class="view-options">
                <i class="fas fa-th-large"></i>
            </div>
        </div>
        <div id="productsGrid" class="products-grid"></div>
        <div class="pagination-wrap" id="paginationContainer"></div>
    </main>
</div>

<!-- CART DRAWER -->
<div id="cartDrawer" class="cart-drawer-overlay">
    <div class="cart-panel">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-basket"></i> Your Cart</h3>
            <button id="closeCartBtn" style="background:none; border:none; color:white; font-size:1.3rem; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItemsList" class="cart-items-list">
            <div class="empty-cart-message">Cart is empty 🛒</div>
        </div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span>Total:</span>
                <span style="font-weight:800; font-size:1.4rem;" id="cartTotalAmount">₹0</span>
            </div>
            <button id="checkoutBtn" class="checkout-button"><i class="fas fa-credit-card"></i> Proceed to Checkout</button>
        </div>
    </div>
</div>

<!-- Stats Modal (Minimal) -->
<div id="statsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:#0F172A; border-radius:28px; max-width:500px; width:90%; padding:2rem; border:1px solid var(--accent);">
        <h3><i class="fas fa-chart-pie"></i> Store Analytics</h3>
        <div id="statsContent">Loading...</div>
        <button id="closeStatsBtn" style="margin-top:1rem; background:var(--surface); border:none; padding:8px 20px; border-radius:40px; cursor:pointer;">Close</button>
    </div>
</div>

<script>
    // CONSTANTS
    const API = "http://localhost:3001";
    
    // STATE
    let products = [];
    let currentPage = 1;
    let totalProducts = 0;
    let limit = 12;
    let activeFilters = {
        search: '',
        minPrice: '',
        maxPrice: '',
        minRating: '',
        sortBy: 'createdAt',
        sortOrder: 'DESC'
    };
    let selectedCategory = "all";
    
    // Cart State (localStorage)
    let cart = JSON.parse(localStorage.getItem("zenith_cart") || "[]");
    
    // DOM Elements
    const productsContainer = document.getElementById("productsGrid");
    const paginationDiv = document.getElementById("paginationContainer");
    const cartDrawer = document.getElementById("cartDrawer");
    const cartItemsContainer = document.getElementById("cartItemsList");
    const cartTotalSpan = document.getElementById("cartTotalAmount");
    const cartBadge = document.getElementById("cartCountBadge");
    const globalSearchInput = document.getElementById("globalSearch");
    
    // Helper: update cart badge
    function updateCartBadge() {
        const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
        cartBadge.innerText = totalItems;
        localStorage.setItem("zenith_cart", JSON.stringify(cart));
        renderCartDrawer();
    }
    
    // Toast
    function showToast(msg, type = "success") {
        const toastDiv = document.createElement("div");
        toastDiv.className = "toast-msg";
        toastDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
        document.body.appendChild(toastDiv);
        setTimeout(() => toastDiv.remove(), 2500);
    }
    
    // Add to Cart logic (FIXED: simple increment)
    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        updateCartBadge();
        showToast(`${product.title} added to cart!`, "success");
    }
    
    // Update quantity in cart
    function updateCartItemQty(id, delta) {
        const idx = cart.findIndex(i => i.id === id);
        if (idx !== -1) {
            const newQty = cart[idx].quantity + delta;
            if (newQty <= 0) {
                cart.splice(idx, 1);
            } else {
                cart[idx].quantity = newQty;
            }
            updateCartBadge();
        }
    }
    
    function removeCartItem(id) {
        cart = cart.filter(i => i.id !== id);
        updateCartBadge();
        showToast("Item removed", "info");
    }
    
    // Render Cart Drawer
    function renderCartDrawer() {
        if (!cartItemsContainer) return;
        if (cart.length === 0) {
            cartItemsContainer.innerHTML = `<div class="empty-cart-message"><i class="fas fa-box-open"></i> Your cart is empty</div>`;
            cartTotalSpan.innerText = "₹0";
            return;
        }
        let total = 0;
        let html = "";
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item-card">
                    <div class="cart-item-icon"><i class="fas fa-cube"></i></div>
                    <div class="cart-item-details">
                        <div class="cart-item-title">${escapeHtml(item.title)}</div>
                        <div class="cart-item-price">₹${item.price.toLocaleString('en-IN')}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="window.updateCartQty(${item.id}, -1)">−</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="window.updateCartQty(${item.id}, 1)">+</button>
                    </div>
                    <button onclick="window.removeCartItem(${item.id})" style="background:none; border:none; color:#EF4444; cursor:pointer;"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
        cartItemsContainer.innerHTML = html;
        cartTotalSpan.innerText = `₹${total.toLocaleString('en-IN')}`;
    }
    
    window.updateCartQty = updateCartItemQty;
    window.removeCartItem = removeCartItem;
    
    // Checkout: order confirmation + clear cart (FIXED: stops direct order without confirm)
    function handleCheckout() {
        if (cart.length === 0) {
            showToast("Cart is empty! Add items first.", "error");
            return;
        }
        const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
        const confirmOrder = confirm(`🛍️ Confirm your order?\n\nTotal: ₹${total.toLocaleString('en-IN')}\nItems: ${cart.length}\n\nClick OK to place order.`);
        if (confirmOrder) {
            showToast(`🎉 Order placed successfully! Total ₹${total.toLocaleString('en-IN')}`, "success");
            cart = [];
            updateCartBadge();
            // Close drawer if open
            cartDrawer.classList.remove("open");
            renderCartDrawer();
        } else {
            showToast("Order cancelled", "info");
        }
    }
    
    // DELETE PRODUCT (FIXED - properly removes from backend and re-fetch)
    async function deleteProductHandler(productId) {
        if (!confirm("⚠️ Permanently delete this product?")) return;
        try {
            const res = await fetch(`${API}/products/${productId}`, { method: "DELETE" });
            if (res.ok || res.status === 200 || res.status === 204) {
                showToast("Product deleted successfully!", "success");
                await loadProducts();  // refresh list
            } else {
                throw new Error("Delete failed");
            }
        } catch (err) {
            showToast("Error deleting product. Check backend connection.", "error");
            console.error(err);
        }
    }
    
    // Load products from backend with filters & pagination
    async function loadProducts() {
        try {
            let url = `${API}/products?page=${currentPage}&limit=${limit}`;
            if (selectedCategory !== "all") url += `&category=${selectedCategory}`;
            if (activeFilters.search) url += `&search=${encodeURIComponent(activeFilters.search)}`;
            if (activeFilters.minPrice) url += `&minPrice=${activeFilters.minPrice}`;
            if (activeFilters.maxPrice) url += `&maxPrice=${activeFilters.maxPrice}`;
            if (activeFilters.minRating) url += `&rating=${activeFilters.minRating}`;
            let sortField = activeFilters.sortBy;
            let sortDir = activeFilters.sortOrder;
            if (activeFilters.sortBy === "price-desc") { sortField = "price"; sortDir = "DESC"; }
            if (activeFilters.sortBy === "price") { sortField = "price"; sortDir = "ASC"; }
            if (activeFilters.sortBy === "rating") { sortField = "rating"; sortDir = "DESC"; }
            if (activeFilters.sortBy === "createdAt") { sortField = "createdAt"; sortDir = "DESC"; }
            url += `&sortBy=${sortField}&sortOrder=${sortDir}`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error("API error");
            const data = await response.json();
            products = data.data || [];
            totalProducts = data.total || 0;
            renderProducts();
            renderPagination();
            document.getElementById("resultInfo").innerHTML = `✨ Showing ${products.length} of ${totalProducts} products`;
        } catch (err) {
            productsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">⚠️ Backend error. Make sure JSON server is running at ${API}<br>Try: npx json-server --watch db.json --port 3001</div>`;
        }
    }
    
    // escapeHtml helper
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function renderProducts() {
        if (!products.length) {
            productsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem;">🔍 No products match filters</div>`;
            return;
        }
        let gridHtml = "";
        for (let p of products) {
            const categoryIcon = getCategoryIcon(p.category);
            const ratingStar = p.rating ? `⭐ ${p.rating.toFixed(1)}` : "⭐ new";
            gridHtml += `
                <div class="product-card">
                    <div class="card-icon"><i class="fas ${categoryIcon}"></i></div>
                    <div class="product-info">
                        <span class="category-badge">${escapeHtml(p.category || 'General')}</span>
                        <div class="product-title">${escapeHtml(p.title)}</div>
                        <div class="brand">${escapeHtml(p.brand || 'No brand')}</div>
                        <div class="price-rating">
                            <span class="price">₹${(p.price || 0).toLocaleString('en-IN')}</span>
                            <span class="rating">${ratingStar}</span>
                        </div>
                        <div class="card-actions">
                            <button class="cart-action" data-product='${JSON.stringify(p).replace(/'/g, "&#39;")}'><i class="fas fa-cart-plus"></i> Add</button>
                            <button class="delete-action" data-id="${p.id}"><i class="fas fa-trash-alt"></i> Delete</button>
                        </div>
                    </div>
                </div>
            `;
        }
        productsContainer.innerHTML = gridHtml;
        // attach dynamic listeners
        document.querySelectorAll('.cart-action').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const prodData = btn.getAttribute('data-product');
                if (prodData) {
                    const product = JSON.parse(prodData);
                    addToCart(product);
                }
            });
        });
        document.querySelectorAll('.delete-action').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                deleteProductHandler(id);
            });
        });
    }
    
    function getCategoryIcon(cat) {
        if (!cat) return "fa-box";
        const map = { "Electronics":"fa-microchip", "Clothing":"fa-tshirt", "Books":"fa-book", "Sports":"fa-futbol", "Home":"fa-home", "Beauty":"fa-spa", "Toys":"fa-rocket" };
        return map[cat] || "fa-tag";
    }
    
    function renderPagination() {
        const totalPages = Math.ceil(totalProducts / limit);
        if (totalPages <= 1) { paginationDiv.innerHTML = ""; return; }
        let btns = `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
        for (let i=1; i<=totalPages; i++) {
            if (i===1 || i===totalPages || (i>=currentPage-1 && i<=currentPage+1)) {
                btns += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            } else if (i===currentPage-2 || i===currentPage+2) btns += `<span style="margin:0 4px;">...</span>`;
        }
        btns += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
        paginationDiv.innerHTML = btns;
        document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
            btn.addEventListener('click', () => {
                let page = parseInt(btn.getAttribute('data-page'));
                if (!isNaN(page) && page>=1 && page<=totalPages) {
                    currentPage = page;
                    loadProducts();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
        });
    }
    
    // apply filters from UI
    function gatherFiltersFromUI() {
        activeFilters.search = globalSearchInput.value;
        activeFilters.minPrice = document.getElementById("minPrice").value;
        activeFilters.maxPrice = document.getElementById("maxPrice").value;
        activeFilters.minRating = document.getElementById("minRating").value;
        const sortVal = document.getElementById("sortSelect").value;
        activeFilters.sortBy = sortVal;
        activeFilters.sortOrder = (sortVal === "price-desc" || sortVal === "rating") ? "DESC" : "ASC";
        if (sortVal === "price") activeFilters.sortBy = "price";
        if (sortVal === "price-desc") activeFilters.sortBy = "price";
        if (sortVal === "rating") activeFilters.sortBy = "rating";
        if (sortVal === "createdAt") activeFilters.sortBy = "createdAt";
        limit = parseInt(document.getElementById("perPageSelect").value);
        currentPage = 1;
        loadProducts();
    }
    
    function resetFilters() {
        document.getElementById("minPrice").value = "";
        document.getElementById("maxPrice").value = "";
        document.getElementById("minRating").value = "";
        document.getElementById("sortSelect").value = "createdAt";
        document.getElementById("perPageSelect").value = "12";
        globalSearchInput.value = "";
        activeFilters = { search:'', minPrice:'', maxPrice:'', minRating:'', sortBy:'createdAt', sortOrder:'DESC' };
        limit = 12;
        currentPage = 1;
        loadProducts();
    }
    
    // Stats modal
    async function showStats() {
        const modal = document.getElementById("statsModal");
        const contentDiv = document.getElementById("statsContent");
        modal.style.display = "flex";
        contentDiv.innerHTML = "Loading analytics...";
        try {
            const res = await fetch(`${API}/statistics`);
            const stats = await res.json();
            contentDiv.innerHTML = `
                <div style="display:grid; gap:12px; margin-top:12px;">
                    <div><i class="fas fa-cubes"></i> Total Products: <strong>${stats.totalProducts || 0}</strong></div>
                    <div><i class="fas fa-chart-line"></i> Avg Price: ₹${(stats.avgPrice || 0).toLocaleString('en-IN')}</div>
                    <div><i class="fas fa-star"></i> Avg Rating: ${(stats.avgRating || 0).toFixed(1)} ⭐</div>
                    <div><i class="fas fa-layer-group"></i> Categories: ${stats.totalCategories || 0}</div>
                    <div><i class="fas fa-boxes"></i> Total Stock: ${stats.totalStock || 0}</div>
                </div>
            `;
        } catch(e) { contentDiv.innerHTML = "Failed to load stats. Ensure backend."; }
    }
    
    // Event listeners
    document.getElementById("applyFilterBtn").addEventListener("click", gatherFiltersFromUI);
    document.getElementById("resetFilterBtn").addEventListener("click", resetFilters);
    document.getElementById("cartDrawerBtn").addEventListener("click", () => { cartDrawer.classList.add("open"); renderCartDrawer(); });
    document.getElementById("closeCartBtn").addEventListener("click", () => cartDrawer.classList.remove("open"));
    document.getElementById("checkoutBtn").addEventListener("click", handleCheckout);
    document.getElementById("statsBtn").addEventListener("click", showStats);
    document.getElementById("closeStatsBtn").addEventListener("click", () => document.getElementById("statsModal").style.display = "none");
    globalSearchInput.addEventListener("keyup", () => { currentPage = 1; gatherFiltersFromUI(); });
    
    // initial load
    updateCartBadge();
    loadProducts();
</script>
</body>
</html>
